name: pr-check

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, orders, inventory, payments, notifications]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: build and test
        run: |
          cd ${{ matrix.service }}
          chmod +x gradlew
          ./gradlew build
          ./gradlew test