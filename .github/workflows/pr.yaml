name: pr-check

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  pull-requests: read

jobs:
  workflow-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # output changed services as json
          filters: |
            frontend: 'frontend/**'
            catalog: 'backend/catalog/**'
            orders: 'backend/orders/**'
            inventory: 'backend/inventory/**'
            payments: 'backend/payments/**'
            notifications: 'backend/notifications/**'

  test:
    needs: detect-changes
    # run if changes detected
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # build dynamic matrix
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        if: ${{ matrix.service != 'frontend' }}
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: build and test
        if: ${{ matrix.service != 'frontend' }}
        run: |
          cd backend/${{ matrix.service }}
          chmod +x gradlew
          ./gradlew build

      - uses: actions/setup-node@v4
        if: ${{ matrix.service == 'frontend' }}
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: lint and build frontend
        if: ${{ matrix.service == 'frontend' }}
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

  demo-traffic-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: parse PowerShell traffic scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem demo/traffic/*.ps1 | ForEach-Object {
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$null,
              [ref]$errors
            ) | Out-Null
          }
          if ($errors.Count -gt 0) {
            $errors | Format-List
            exit 1
          }
          if (Get-ChildItem demo/traffic/*.ps1 | Select-String -Pattern 'notifications' -CaseSensitive:$false) {
            throw 'Notifications must not be included in demo traffic scripts.'
          }
