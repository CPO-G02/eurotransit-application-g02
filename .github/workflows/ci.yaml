name: ci

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, orders, inventory, payments, notifications]

    steps:
      # checkout app code
      - uses: actions/checkout@v4

      # setup java to run gradle build and tests first
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      # run unit and integration tests
      - name: build and test
        run: |
          cd ${{ matrix.service }}
          chmod +x gradlew
          ./gradlew build
          ./gradlew test

      # login to azure container registry
      - uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # build and push docker image
      - name: build and push
        run: |
          tag=$(git rev-parse --short HEAD)
          image="${{ secrets.ACR_LOGIN_SERVER }}/eurotransit-${{ matrix.service }}:$tag"
          
          docker build -t $image ./${{ matrix.service }}
          docker push $image

      # checkout config repo
      - uses: actions/checkout@v4
        with:
          repository: CPO-G02/eurotransit-configuration-g02
          token: ${{ secrets.GITOPS_TOKEN }}
          path: config-repo

      # update helm values and push to trigger argo cd
      - name: update values and commit
        run: |
          cd config-repo
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          tag=$(git rev-parse --short HEAD)
          
          sed -i "s/${{ matrix.service }}Tag:.*/${{ matrix.service }}Tag: $tag/g" deploy/charts/eurotransit/values.yaml
          
          git add deploy/charts/eurotransit/values.yaml
          git commit -m "chore: update ${{ matrix.service }} image tag to $tag" || echo "no changes"
          
          # loop with retries in case multiple matrix jobs push at the exact same time
          n=0
          until [ "$n" -ge 5 ]
          do
             git pull --rebase origin main && git push origin main && break
             n=$((n+1))
             sleep 5
          done