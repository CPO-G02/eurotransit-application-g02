name: ci

on:
  push:
    branches:
      - main
      - dev
      - test-ci-pipelines

permissions:
  contents: read
  
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # output changed services as json
          filters: |
            frontend: 'frontend/**'
            catalog: 'backend/catalog/**'
            orders: 'backend/orders/**'
            inventory: 'backend/inventory/**'
            payments: 'backend/payments/**'
            notifications: 'backend/notifications/**'
            payment-gateway-sim: 'backend/payment-gateway-sim/**'

  build-and-deploy:
    needs: detect-changes
    # run if changes detected
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # build dynamic matrix
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      # checkout app
      - uses: actions/checkout@v4

      # setup java
      - uses: actions/setup-java@v4
        if: ${{ matrix.service != 'frontend' }}
        with:
          java-version: '21'
          distribution: 'temurin'
          
      # run tests
      - name: build and test
        if: ${{ matrix.service != 'frontend' }}
        run: |
          cd backend/${{ matrix.service }}
          chmod +x gradlew
          ./gradlew build

      - uses: actions/setup-node@v4
        if: ${{ matrix.service == 'frontend' }}
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: lint and build frontend
        if: ${{ matrix.service == 'frontend' }}
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: build container
        run: |
          context="./backend/${{ matrix.service }}"
          if [ "${{ matrix.service }}" = "frontend" ]; then
            context="./frontend"
          fi

          image="${{ secrets.ACR_LOGIN_SERVER }}/eurotransit/${{ matrix.service }}:latest"
          docker build -t "$image" "$context"

      # Only main may publish a production image or update the GitOps source of
      # truth. dev and test-ci-pipelines still build/test without moving latest.
      - uses: azure/docker-login@v1
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: push and verify immutable digest
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          image="${{ secrets.ACR_LOGIN_SERVER }}/eurotransit/${{ matrix.service }}:latest"

          push_output=$(docker push "$image")
          echo "$push_output"
          pushed_digest=$(echo "$push_output" | grep -oP 'digest: \K\S+')

          if ! echo "$pushed_digest" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "::error::docker push did not report a valid immutable digest"
            exit 1
          fi

          # Resolve the registry state independently: a pre-existing latest tag
          # is not proof that this run moved it to the image just pushed.
          live_digest=$(docker manifest inspect "$image" --verbose | python3 -c "import json,sys; print(json.load(sys.stdin)['Descriptor']['digest'])")

          if [ "$live_digest" != "$pushed_digest" ]; then
            echo "::error::Pushed $pushed_digest but the 'latest' tag resolves to $live_digest - push did not actually update the tag"
            exit 1
          fi

          echo "IMAGE_DIGEST=$live_digest" >> "$GITHUB_ENV"

      - name: install pinned yq
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          YQ_VERSION: v4.53.2
          YQ_SHA256: d56bf5c6819e8e696340c312bd70f849dc1678a7cda9c2ad63eebd906371d56b
        run: |
          install_dir="$RUNNER_TEMP/yq-$YQ_VERSION"
          mkdir -p "$install_dir"

          curl --fail --location --silent --show-error \
            "https://github.com/mikefarah/yq/releases/download/$YQ_VERSION/yq_linux_amd64" \
            --output "$install_dir/yq_linux_amd64"

          cd "$install_dir"
          echo "$YQ_SHA256  yq_linux_amd64" | sha256sum --check --strict
          mv yq_linux_amd64 yq
          chmod +x yq

          echo "$install_dir" >> "$GITHUB_PATH"
          ./yq --version

      # checkout config
      - uses: actions/checkout@v4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          repository: CPO-G02/eurotransit-configuration-g02
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: main
          path: config-repo

      # The digest is the release identity for every progressively managed
      # service. restartedAt remains useful traceability and is still the
      # rollout trigger for Notifications, which stays tag-based and standard.
      - name: update GitOps image and commit
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          cd config-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          restarted_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)-${{ github.sha }}"

          # Matrix jobs can update the same values file concurrently. Start each
          # attempt from the latest main and reapply this service's update so a
          # rejected push never leaves the next retry in a conflicted rebase.
          for attempt in 1 2 3 4 5; do
            if ! git fetch origin main; then
              if [ "$attempt" -lt 5 ]; then
                sleep 5
                continue
              fi
              break
            fi

            git reset --hard origin/main

            # Only pin an immutable digest for a service that is actually
            # running canary/blueGreen right now. Setting it unconditionally
            # (the previous behaviour here) reintroduced the exact bug the
            # canary PR review already fixed once: a "standard" service is
            # supposed to resolve "latest" via restartedAt, and a stray digest
            # here makes eurotransit.imageReference pin it anyway. Confirmed
            # live 2026-07-16 - this path pinned orders while
            # deploymentStrategies.orders was "standard".
            service="${{ matrix.service }}"
            set_digest=false
            case "$service" in
              frontend|catalog|orders)
                strategy=$(yq '.deploymentStrategies.'"$service"' // "standard"' deploy/charts/eurotransit/values.yaml)
                [ "$strategy" != "standard" ] && set_digest=true
                ;;
              inventory|payments)
                enabled=$(yq '.blueGreen.'"$service"'.enabled // false' deploy/charts/eurotransit/values.yaml)
                [ "$enabled" = "true" ] && set_digest=true
                ;;
              *)
                # notifications and payment-gateway-sim have no progressive
                # delivery mode at all - always tag-based.
                ;;
            esac

            if [ "$set_digest" = "true" ]; then
              IMAGE_DIGEST="$IMAGE_DIGEST" yq -i '.'"$service"'.image.digest = strenv(IMAGE_DIGEST)' deploy/charts/eurotransit/values.yaml
            fi

            RESTARTED_AT="$restarted_at" yq -i '.'"$service"'.restartedAt = strenv(RESTARTED_AT)' deploy/charts/eurotransit/values.yaml

            git add deploy/charts/eurotransit/values.yaml
            if git diff --cached --quiet; then
              echo "Configuration already contains the requested update"
              exit 0
            fi

            git commit -m "chore: deploy ${{ matrix.service }} image for ${{ github.sha }}"

            if git push origin HEAD:main; then
              exit 0
            fi

            if [ "$attempt" -lt 5 ]; then
              sleep 5
            fi
          done

          echo "::error::Failed to update configuration main after 5 attempts"
          exit 1
