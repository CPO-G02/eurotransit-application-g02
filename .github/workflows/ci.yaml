name: ci

on:
  push:
    branches:
      - main
      - dev
      - test-ci-pipelines
  pull_request:
    branches:
      - main
      - dev
  
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # output changed services as json
          list-tags: 'json'
          filters: |
            catalog: 'backend/catalog/**'
            orders: 'backend/orders/**'
            inventory: 'backend/inventory/**'
            payments: 'backend/payments/**'
            notifications: 'backend/notifications/**'

  build-and-deploy:
    needs: detect-changes
    # run if changes detected
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # build dynamic matrix
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      # checkout app
      - uses: actions/checkout@v4

      # setup java
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      # run tests
      - name: build and test
        run: |
          cd backend/${{ matrix.service }}
          chmod +x gradlew
          ./gradlew build
          ./gradlew test

      # acr login
      - uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # build and push
      - name: build and push
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          tag="${IMAGE_TAG:0:7}"
          image="${{ secrets.ACR_LOGIN_SERVER }}/eurotransit-${{ matrix.service }}:$tag"
          
          docker build -t $image ./backend/${{ matrix.service }}
          docker push $image

      # checkout config
      - uses: actions/checkout@v4
        with:
          repository: CPO-G02/eurotransit-configuration-g02
          token: ${{ secrets.GITOPS_TOKEN }}
          path: config-repo

      # update helm values
      - name: update values and commit
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd config-repo
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          tag="${IMAGE_TAG:0:7}"
          
          # update nested tag value using yq
          yq -i ".${{ matrix.service }}.image.tag = \"$tag\"" deploy/charts/eurotransit/values.yaml
          
          git add deploy/charts/eurotransit/values.yaml
          git commit -m "chore: update ${{ matrix.service }} image tag to $tag" || echo "no changes"
          
          # retry push on collision
          n=0
          until [ "$n" -ge 5 ]
          do
             git pull --rebase origin main && git push origin main && break
             n=$((n+1))
             sleep 5
          done
