name: ci

on:
  push:
    branches:
      - main
      - dev
      - test-ci-pipelines
  
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # output changed services as json
          list-tags: 'json'
          filters: |
            frontend: 'frontend/**'
            catalog: 'backend/catalog/**'
            orders: 'backend/orders/**'
            inventory: 'backend/inventory/**'
            payments: 'backend/payments/**'
            notifications: 'backend/notifications/**'

  build-and-deploy:
    needs: detect-changes
    # run if changes detected
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # build dynamic matrix
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      # checkout app
      - uses: actions/checkout@v4

      # setup java
      - uses: actions/setup-java@v4
        if: ${{ matrix.service != 'frontend' }}
        with:
          java-version: '21'
          distribution: 'temurin'
          
      # run tests
      - name: build and test
        if: ${{ matrix.service != 'frontend' }}
        run: |
          cd backend/${{ matrix.service }}
          chmod +x gradlew
          ./gradlew build
          ./gradlew test

      # feature/frontend-updates contains the React/Vite source. Keep this
      # workflow compatible until that branch reaches dev: the Node steps are
      # enabled as soon as its lockfile is present, while the Docker build below
      # continues to validate the current legacy Frontend in the meantime.
      - uses: actions/setup-node@v4
        if: ${{ matrix.service == 'frontend' && hashFiles('frontend/package-lock.json') != '' }}
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: lint and build frontend
        if: ${{ matrix.service == 'frontend' && hashFiles('frontend/package-lock.json') != '' }}
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: build container
        run: |
          context="./backend/${{ matrix.service }}"
          if [ "${{ matrix.service }}" = "frontend" ]; then
            context="./frontend"
          fi

          image="${{ secrets.ACR_LOGIN_SERVER }}/eurotransit/${{ matrix.service }}:latest"
          docker build -t "$image" "$context"

      # Only main may publish a production image or update the GitOps source of
      # truth. dev and test-ci-pipelines still build/test without moving latest.
      - uses: azure/docker-login@v1
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: push and verify immutable digest
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          image="${{ secrets.ACR_LOGIN_SERVER }}/eurotransit/${{ matrix.service }}:latest"

          push_output=$(docker push "$image")
          echo "$push_output"
          pushed_digest=$(echo "$push_output" | grep -oP 'digest: \K\S+')

          if ! echo "$pushed_digest" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "::error::docker push did not report a valid immutable digest"
            exit 1
          fi

          # Resolve the registry state independently: a pre-existing latest tag
          # is not proof that this run moved it to the image just pushed.
          live_digest=$(docker manifest inspect "$image" --verbose | python3 -c "import json,sys; print(json.load(sys.stdin)['Descriptor']['digest'])")

          if [ "$live_digest" != "$pushed_digest" ]; then
            echo "::error::Pushed $pushed_digest but the 'latest' tag resolves to $live_digest - push did not actually update the tag"
            exit 1
          fi

          echo "IMAGE_DIGEST=$live_digest" >> "$GITHUB_ENV"

      # checkout config
      - uses: actions/checkout@v4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          repository: CPO-G02/eurotransit-configuration-g02
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: main
          path: config-repo

      # The digest is the release identity for every progressively managed
      # service. restartedAt remains useful traceability and is still the
      # rollout trigger for Notifications, which stays tag-based and standard.
      - name: update GitOps image and commit
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          cd config-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ matrix.service }}" != "notifications" ]; then
            IMAGE_DIGEST="$IMAGE_DIGEST" yq -i '.${{ matrix.service }}.image.digest = strenv(IMAGE_DIGEST)' deploy/charts/eurotransit/values.yaml
          fi

          yq -i ".${{ matrix.service }}.restartedAt = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)-${{ github.sha }}\"" deploy/charts/eurotransit/values.yaml

          git add deploy/charts/eurotransit/values.yaml
          git commit -m "chore: deploy ${{ matrix.service }} image for ${{ github.sha }}" || echo "no changes"

          # Matrix jobs can update different services concurrently. Rebase and
          # retry boundedly, but never report success if every push failed.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi

            if [ "$attempt" -lt 5 ]; then
              sleep 5
            fi
          done

          echo "::error::Failed to update configuration main after 5 attempts"
          exit 1
