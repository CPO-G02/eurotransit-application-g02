name: ci

on:
  push:
    branches:
      - main
      - dev
      - test-ci-pipelines
  
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # output changed services as json
          list-tags: 'json'
          filters: |
            catalog: 'backend/catalog/**'
            orders: 'backend/orders/**'
            inventory: 'backend/inventory/**'
            payments: 'backend/payments/**'
            notifications: 'backend/notifications/**'

  build-and-deploy:
    needs: detect-changes
    # run if changes detected
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # build dynamic matrix
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      # checkout app
      - uses: actions/checkout@v4

      # setup java
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      # run tests
      - name: build and test
        run: |
          cd backend/${{ matrix.service }}
          chmod +x gradlew
          ./gradlew build
          ./gradlew test

      # acr login
      - uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # build and push
      # Image tag is fixed at "latest" - the Deployment's imagePullPolicy is
      # Always (see values.yaml), so pods always pull the newest push rather
      # than reusing a locally-cached copy under the same tag name.
      - name: build and push
        run: |
          # NOTE: "eurotransit/<service>" (slash), matching the repository
          # path every Deployment actually pulls from - not
          # "eurotransit-<service>" (hyphen), which silently pushed to a
          # repository nothing ever reads from.
          image="${{ secrets.ACR_LOGIN_SERVER }}/eurotransit/${{ matrix.service }}:latest"

          docker build -t $image ./backend/${{ matrix.service }}

          push_output=$(docker push $image)
          echo "$push_output"
          pushed_digest=$(echo "$push_output" | grep -oP 'digest: \K\S+')

          if [ -z "$pushed_digest" ]; then
            echo "::error::docker push did not report a digest - treating this as a failed push"
            exit 1
          fi

          # A tag can exist and "docker manifest inspect" successfully even
          # when this specific push silently failed to move the pointer -
          # that gap is exactly what let a stale image get deployed earlier.
          # Confirm "latest" now actually resolves to the digest we just
          # pushed, not leftover content from an older run.
          live_digest=$(docker manifest inspect "$image" --verbose | python3 -c "import json,sys; print(json.load(sys.stdin)['Descriptor']['digest'])")

          if [ "$live_digest" != "$pushed_digest" ]; then
            echo "::error::Pushed $pushed_digest but the 'latest' tag resolves to $live_digest - push did not actually update the tag"
            exit 1
          fi

      # checkout config
      - uses: actions/checkout@v4
        with:
          repository: CPO-G02/eurotransit-configuration-g02
          token: ${{ secrets.GITOPS_TOKEN }}
          path: config-repo

      # trigger rollout
      # The image tag itself ("latest") never changes, so nothing about the
      # Deployment spec would otherwise differ after a new push - Kubernetes
      # only rolls pods when the pod template actually changes. Bumping a
      # restartedAt annotation via the git-tracked value is what forces that,
      # keeping this fully GitOps (no direct cluster credentials in CI).
      - name: bump restart annotation and commit
        run: |
          cd config-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          yq -i ".${{ matrix.service }}.restartedAt = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)-${{ github.sha }}\"" deploy/charts/eurotransit/values.yaml

          git add deploy/charts/eurotransit/values.yaml
          git commit -m "chore: trigger ${{ matrix.service }} rollout for ${{ github.sha }}" || echo "no changes"

          # retry push on collision
          n=0
          until [ "$n" -ge 5 ]
          do
             git pull --rebase origin main && git push origin main && break
             n=$((n+1))
             sleep 5
          done
