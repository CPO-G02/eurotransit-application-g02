events {}

http {
    include mime.types;
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html;
            # SPA fallback: react-router-dom handles routing client-side, so
            # any path without a matching static file must still serve
            # index.html, not 404 - otherwise direct navigation/refresh on
            # any route but "/" breaks.
            try_files $uri /index.html;
            # index.html is unhashed and references the current build's
            # hashed asset filenames - without this, browsers apply
            # heuristic caching (no cache-control at all was set) and can
            # keep serving a stale build long after a new one is deployed.
            add_header Cache-Control "no-cache" always;
        }

        location /assets/ {
            root /usr/share/nginx/html;
            # Vite content-hashes these filenames, so a given URL's content
            # never changes - safe to cache indefinitely.
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
    }
}