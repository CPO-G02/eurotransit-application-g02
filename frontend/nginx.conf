events {}

http {
    include mime.types;
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html;
            # SPA fallback: react-router-dom handles routing client-side, so
            # any path without a matching static file must still serve
            # index.html, not 404 - otherwise direct navigation/refresh on
            # any route but "/" breaks.
            try_files $uri /index.html;
        }
    }
}