server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: payment-gateway-sim
  lifecycle:
    timeout-per-shutdown-phase: 30s

app:
  gateway:
    # Amounts above this threshold are declined with insufficient_funds
    # (the decline rule migrated here from Payments' in-process mock).
    decline-above: 500.00

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
