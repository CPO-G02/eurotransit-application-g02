server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: payments
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://g02.cpo2026.it/auth/realms/eurotransit}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  r2dbc:
    # Local-dev defaults; overridden by env from the payments-db secret in cluster.
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/payments}
    username: ${SPRING_R2DBC_USERNAME:payments}
    password: ${SPRING_R2DBC_PASSWORD:payments}
  sql:
    init:
      mode: always

app:
  security:
    jwt:
      audience: ${PAYMENTS_JWT_AUDIENCE:payments}
  gateway:
    # Base URL of the (simulated) external payment gateway service.
    url: ${GATEWAY_URL:http://localhost:8090}
    # Bounds a hung call as a failure; kept above slow-call-duration-threshold
    # so merely-slow calls register as slow rather than as errors.
    timeout: 5s

resilience4j:
  circuitbreaker:
    instances:
      payment-gateway:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        # Open on latency too, not only on exceptions: a call slower than 2s is
        # treated as failed (chaos "latency injection into Payments" requirement).
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    circuitbreakers:
      enabled: true
