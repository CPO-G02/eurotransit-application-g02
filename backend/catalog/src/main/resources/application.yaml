spring:
  application:
    name: catalog
  r2dbc:
    # Local-dev defaults only; overridden by env in the cluster from the
    # catalog-db CloudNativePG secret. No production credentials are committed.
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/catalog}
    username: ${SPRING_R2DBC_USERNAME:catalog}
    password: ${SPRING_R2DBC_PASSWORD:catalog}
  sql:
    init:
      # Runs schema.sql then data.sql on startup. Both are idempotent
      # (IF NOT EXISTS / ON CONFLICT DO NOTHING) so repeated restarts are safe.
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  # 100% sampling: this project's traffic is low enough that dropping spans
  # would just mean missing the money-path trace when it's actually needed.
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
