server:
  port: 8080
  shutdown: graceful

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: orders
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://g02.cpo2026.it/auth/realms/eurotransit}
  
  # run schema.sql on startup
  sql:
    init:
      mode: always
  
  # reactive postgresql connection
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orders_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    pool:
      max-size: 10
      initial-size: 5

  # kafka configuration
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: orders-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Every Stage1-4Consumer takes a raw String and self-parses via
      # objectMapper.readTree(message) - JsonDeserializer pre-deserializes into
      # a LinkedHashMap instead, which Spring can't convert to the listener's
      # String parameter, so every message failed conversion and was never
      # acknowledged (endless redelivery, saga never advances past Stage 1).
      # Confirmed live 2026-07-16: MessageConversionException on every
      # order-placed message since deploy.
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    # Propagates the trace context across the outbox's Kafka hops (each
    # Stage1-4Consumer both consumes and, via the outbox, produces the next
    # stage's event) - without this, the money-path trace would break into
    # disconnected fragments at every Kafka boundary instead of one span tree.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

# custom app properties v3 main
app:
  kafka:
    topics:
      order-placed: eurotransit.order-placed
      inventory-reserved: eurotransit.inventory-reserved
      payment-authorized: eurotransit.payment-authorized
      payment-failed: eurotransit.payment-failed
      order-confirmed: eurotransit.order-confirmed
      order-failed: eurotransit.order-failed
  payments:
    url: http://${PAYMENTS_HOST:localhost}:8080/api/v1/payments
    # Must exceed Payments' own 5s gateway timeout (see payments app.gateway.timeout).
    timeout: 6s
  inventory:
    url: http://${INVENTORY_HOST:localhost}:8080
    timeout: 2s
  security:
    jwt:
      audience: ${ORDERS_JWT_AUDIENCE:orders}
      # Keys are fetched from Keycloak's in-cluster Service, not the public
      # issuer-uri above - startup shouldn't depend on external ingress/DNS
      # being reachable. Token 'iss' claims are still validated against the
      # public issuer-uri (see SecurityConfig.jwtDecoder), since that's what
      # Keycloak actually stamps on real tokens.
      jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://eurotransit-keycloak-service:8080/auth/realms/eurotransit/protocol/openid-connect/certs}
    # One orders-service token for all outbound sync calls (Inventory + Payments).
    service-token:
      enabled: ${SERVICE_TOKEN_ENABLED:false}
      token-uri: ${KEYCLOAK_TOKEN_URI:https://g02.cpo2026.it/auth/realms/eurotransit/protocol/openid-connect/token}
      client-id: ${ORDERS_SERVICE_CLIENT_ID:orders-service}
      client-secret: ${ORDERS_SERVICE_CLIENT_SECRET:}
      scope: ${ORDERS_SERVICE_TOKEN_SCOPE:}
  backpressure:
    orders:
      enabled: ${ORDERS_BACKPRESSURE_ENABLED:true}
      max-concurrent-requests: ${ORDERS_BACKPRESSURE_MAX_CONCURRENT_REQUESTS:20}
      retry-after-seconds: ${ORDERS_BACKPRESSURE_RETRY_AFTER_SECONDS:1}

# circuit breaker for sync calls
resilience4j:
  circuitbreaker:
    instances:
      payments-client:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      inventory-client:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      payments-client:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
      inventory-client:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
