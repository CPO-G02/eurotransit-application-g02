server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: inventory
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://g02.cpo2026.it/auth/realms/eurotransit}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  r2dbc:
    # Local-dev defaults; overridden by env from the inventory-db secret in cluster.
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/inventory}
    username: ${SPRING_R2DBC_USERNAME:inventory}
    password: ${SPRING_R2DBC_PASSWORD:inventory}
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: inventory-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

app:
  security:
    jwt:
      audience: ${INVENTORY_JWT_AUDIENCE:inventory}
      # Keys are fetched from Keycloak's in-cluster Service, not the public
      # issuer-uri above - startup shouldn't depend on external ingress/DNS
      # being reachable. Token 'iss' claims are still validated against the
      # public issuer-uri (see SecurityConfig.jwtDecoder), since that's what
      # Keycloak actually stamps on real tokens.
      jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://eurotransit-keycloak-service:8080/auth/realms/eurotransit/protocol/openid-connect/certs}
  kafka:
    topics:
      order-failed: eurotransit.order-failed

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
