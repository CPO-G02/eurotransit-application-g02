spring:
  application:
    name: notifications
  lifecycle:
    timeout-per-shutdown-phase: 30s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notifications-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Was JsonDeserializer, which deserializes straight to a plain
      # LinkedHashMap when the producer (Orders' outbox) sends no type header
      # it can resolve - Orders doesn't have these DTOs on its classpath, so
      # there's nothing to key a type mapping off. StringDeserializer plus the
      # RecordMessageConverter bean in KafkaConfig hands each @KafkaListener
      # its raw JSON string and lets that converter do the parsing AND the
      # type conversion into whatever type the listener method declares
      # (OrderConfirmedEvent vs OrderFailedEvent) in one step. Confirmed live
      # 2026-07-16: every order-confirmed/order-failed message was silently
      # dropped ("Cannot convert from LinkedHashMap to OrderConfirmedEvent")
      # until this pairing was fixed.
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health
  endpoint:
    prometheus:
      enabled: true
    health:
      probes:
        enabled: true
      show-details: never

server:
  shutdown: graceful